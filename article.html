<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article - Dalal Street Insider</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .article-container {
      background-color: #fff;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      margin-bottom: 40px;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      font-weight: 600;
      color: var(--primary-color);
      text-decoration: none;
      text-transform: uppercase;
      font-size: 0.9rem;
    }
    .back-link:hover {
      text-decoration: underline;
    }
    .article-page-title {
      font-family: var(--font-serif);
      font-size: 2.5rem;
      color: var(--text-main);
      margin-bottom: 20px;
      line-height: 1.2;
    }
    .article-page-content {
      font-size: 1.15rem;
      color: var(--text-muted);
      margin-bottom: 30px;
      line-height: 1.8;
    }
    .btn-source {
      display: inline-block;
      background-color: var(--text-main);
      color: #fff;
      padding: 12px 25px;
      text-decoration: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      transition: var(--transition);
      text-transform: uppercase;
    }
    .btn-source:hover {
      background-color: var(--primary-color);
    }
    .related-section {
      margin-top: 50px;
      border-top: 2px solid var(--border-color);
      padding-top: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 class="masthead">Dalal Street Insider</h1>
    </header>

    <div class="main-layout" style="grid-template-columns: 1fr;">
      <main>
        <a href="index.html" class="back-link">&larr; Back to Briefing</a>
        
        <div class="article-container" id="article-detail">
          <!-- Article will be injected here -->
          <h2 style="font-family: var(--font-serif); color: var(--text-muted);">Loading article...</h2>
        </div>

        <div class="related-section">
          <h2 class="section-header">Related News</h2>
          <div class="news-grid" id="related-container">
            <!-- Related articles injected here -->
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Load the data first -->
  <script src="app.js"></script>
  <!-- Load the article specific logic -->
  <script src="article.js"></script>
</body>
</html>
