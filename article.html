<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article - Dalal Street Insider</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1 class="masthead">Dalal Street Insider</h1>
    </header>

    <div class="main-layout" style="grid-template-columns: 1fr;">
      <main>
        <a href="index.html" class="back-link">&larr; Back to Briefing</a>
        
        <div class="article-container" id="article-detail">
          <!-- Article will be injected here -->
          <h2 style="font-family: var(--font-serif); color: var(--text-muted);">Loading article...</h2>
        </div>

        <div class="related-section">
          <h2 class="section-header">Related News</h2>
          <div class="news-grid" id="related-container">
            <!-- Related articles injected here -->
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Load the data first -->
  <script src="app.js"></script>
  <!-- Load the article specific logic -->
  <script src="article.js"></script>
</body>
</html>
