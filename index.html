<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dalal Street Insider</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-meta">
        <span id="header-date">Loading date...</span>
        <span id="last-updated">Last Updated: Just now</span>
        <button class="btn-refresh" id="refresh-btn">Refresh Now</button>
      </div>
      <h1 class="masthead">Dalal Street Insider</h1>
      <p style="font-family: var(--font-serif); font-style: italic; color: var(--text-muted);">Your personalized daily briefing. Filtering the noise.</p>
    </header>

    <div class="main-layout">
      <div class="main-content">
        <nav id="tabs-container" class="tabs-nav"></nav>
        <main id="news-container">
          <!-- News sections will be dynamically injected here -->
        </main>
      </div>

      <div class="sidebar-section market-pulse-section">
        <h2 class="sidebar-title">Market Pulse</h2>
        <ul style="list-style:none; padding:0; font-size:0.95rem; color:var(--text-muted);">
          <li style="margin-bottom:10px; border-bottom:1px solid #ddd; padding-bottom:5px;"><strong>NIFTY 50:</strong> <span id="pulse-nifty">24,168 <span style="color:green">▲ 0.34%</span></span></li>
          <li style="margin-bottom:10px; border-bottom:1px solid #ddd; padding-bottom:5px;"><strong>SENSEX:</strong> <span id="pulse-sensex">77,410 <span style="color:green">▲ 0.33%</span></span></li>
          <li style="margin-bottom:10px; border-bottom:1px solid #ddd; padding-bottom:5px;"><strong>GOLD (10g):</strong> <span id="pulse-gold">₹1,28,170 <span style="color:red">▼ 0.45%</span></span></li>
          <li style="margin-bottom:10px; border-bottom:1px solid #ddd; padding-bottom:5px;"><strong>CRUDE OIL (WTI):</strong> <span id="pulse-crude">Loading...</span></li>
          <li><strong>USD/INR:</strong> <span id="pulse-usdinr">94.32 <span style="color:red">▼ 0.20%</span></span></li>
        </ul>
      </div>

      <div class="sidebar-section book-section">
        <h2 class="sidebar-title">Book of the Week</h2>
        <div class="book-card" id="book-container">
          <!-- Book content dynamically injected -->
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
